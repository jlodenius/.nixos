# Dedicated fuzzel config for the helium-launcher, passed via --config
# so the global fuzzel behaviour stays untouched.
[main]
prompt=
lines=12
width=70
tabs=4

[key-bindings]
# Free Ctrl+K from its default (delete-line-forward) so it can move selection up.
delete-line-forward=none
prev=Up Control+k
next=Down Control+j
