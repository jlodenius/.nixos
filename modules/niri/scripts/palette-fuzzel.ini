# Dedicated fuzzel config for the Helium bookmark palette, passed via --config
# so your global fuzzel behaviour stays untouched. Adds vim-style Ctrl+J/Ctrl+K
# navigation on top of the defaults.
[main]
prompt=open >
lines=12
width=70
tabs=4

[key-bindings]
next=Down Control+n Control+j
prev=Up Control+p Control+k
