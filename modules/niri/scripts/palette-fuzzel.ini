# Dedicated fuzzel config for the Helium bookmark palette, passed via --config
# so your global fuzzel behaviour stays untouched.
[main]
prompt=
lines=12
width=70
tabs=4

[key-bindings]
# Free Ctrl+K from its default (delete-line-forward) so it can move selection up.
delete-line-forward=none
prev=Up Control+p Control+k
next=Down Control+n Control+j
